version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartstock-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smartstock_password
      POSTGRES_DB: smartstock
    ports:
      - "5432:5432"
    volumes:
      - smartstock-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smartstock-redis
    ports:
      - "6379:6379"
    volumes:
      - smartstock-redis-data:/data
    restart: unless-stopped

volumes:
  smartstock-db-data:
  smartstock-redis-data:
